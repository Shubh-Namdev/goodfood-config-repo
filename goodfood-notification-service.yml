server:
  port: 

spring:
  application:
    name: goodfood-notification-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # useful for Kubernetes liveness/readiness
  metrics:
    tags:
      application: ${spring.application.name}
      service-type: notification
  # tracing:
  #   sampling:
  #     probability: 1.0
